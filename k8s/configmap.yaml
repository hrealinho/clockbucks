apiVersion: v1
kind: ConfigMap
metadata:
  name: clockbucks-config
  namespace: clockbucks
data:
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8000"
  ALLOWED_ORIGINS: "*"
  API_PREFIX: "/api"
---
apiVersion: v1
kind: Secret
metadata:
  name: clockbucks-secrets
  namespace: clockbucks
type: Opaque
stringData:
  POSTGRES_DB: "clockbucks"
  POSTGRES_USER: "clockbucks"
  POSTGRES_PASSWORD: "your-secure-password-here"
  DATABASE_URL: "postgresql://clockbucks:your-secure-password-here@postgres:5432/clockbucks"
