version: '3.8'

services:
  clockbucks-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clockbucks-api-dev
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8000
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    volumes:
      - .:/app
      - /app/__pycache__
    networks:
      - clockbucks-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

