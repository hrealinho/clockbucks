name: 🔒 Security Scans

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run security scans daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  codeql:
    name: "🔍 CodeQL Analysis"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      
    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]
        
    steps:
    - name: "📥 Checkout repository"
      uses: actions/checkout@v4
      
    - name: "🔧 Initialize CodeQL"
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality
        
    - name: "🔨 Autobuild"
      uses: github/codeql-action/autobuild@v2
      
    - name: "📊 Perform CodeQL Analysis"
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:${{matrix.language}}"

  dependency-review:
    name: "📋 Dependency Review"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: "📥 Checkout Repository"
      uses: actions/checkout@v4
      
    - name: "🔍 Dependency Review"
      uses: actions/dependency-review-action@v3
      with:
        fail-on-severity: moderate
        allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC
        
  secrets-scan:
    name: "🔐 Secrets Scanning"
    runs-on: ubuntu-latest
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: "🔍 Run TruffleHog"
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified
        
  bandit-scan:
    name: "🛡️ Bandit Security Scan"
    runs-on: ubuntu-latest
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "🐍 Set up Python"
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: "📦 Install Bandit"
      run: pip install bandit[toml]
      
    - name: "🔍 Run Bandit scan"
      run: |
        bandit -r src/ -f json -o bandit-report.json
        bandit -r src/ -f txt
        
    - name: "📋 Upload Bandit report"
      uses: actions/upload-artifact@v3
      with:
        name: bandit-report
        path: bandit-report.json
        
  safety-scan:
    name: "🔒 Safety Vulnerability Scan"
    runs-on: ubuntu-latest
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "🐍 Set up Python"
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: "📦 Install dependencies"
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install safety
        
    - name: "🔍 Run Safety check"
      run: |
        safety check --json --output safety-report.json
        safety check
        
    - name: "📋 Upload Safety report"
      uses: actions/upload-artifact@v3
      with:
        name: safety-report
        path: safety-report.json
        
  docker-scan:
    name: "🐳 Docker Security Scan"
    runs-on: ubuntu-latest
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "🔧 Set up Docker Buildx"
      uses: docker/setup-buildx-action@v3
      
    - name: "🔨 Build Docker image"
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.prod
        tags: clockbucks-api:security-scan
        load: true
        
    - name: "🔍 Run Trivy vulnerability scanner"
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'clockbucks-api:security-scan'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: "📋 Upload Trivy scan results to GitHub Security tab"
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
        
    - name: "🔍 Run Trivy filesystem scan"
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-fs-results.sarif'
        
    - name: "📋 Upload Trivy filesystem scan results"
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-fs-results.sarif'

  security-summary:
    name: "📊 Security Summary"
    runs-on: ubuntu-latest
    needs: [codeql, bandit-scan, safety-scan, docker-scan, secrets-scan]
    if: always()
    
    steps:
    - name: "📥 Download all reports"
      uses: actions/download-artifact@v3
      
    - name: "📊 Generate security summary"
      run: |
        echo "# 🔒 Security Scan Summary" > security-summary.md
        echo "" >> security-summary.md
        echo "## Scan Results" >> security-summary.md
        echo "" >> security-summary.md
        
        # Check job statuses
        if [ "${{ needs.codeql.result }}" = "success" ]; then
          echo "✅ CodeQL Analysis: Passed" >> security-summary.md
        else
          echo "❌ CodeQL Analysis: Failed" >> security-summary.md
        fi
        
        if [ "${{ needs.bandit-scan.result }}" = "success" ]; then
          echo "✅ Bandit Security Scan: Passed" >> security-summary.md
        else
          echo "❌ Bandit Security Scan: Failed" >> security-summary.md
        fi
        
        if [ "${{ needs.safety-scan.result }}" = "success" ]; then
          echo "✅ Safety Vulnerability Scan: Passed" >> security-summary.md
        else
          echo "❌ Safety Vulnerability Scan: Failed" >> security-summary.md
        fi
        
        if [ "${{ needs.docker-scan.result }}" = "success" ]; then
          echo "✅ Docker Security Scan: Passed" >> security-summary.md
        else
          echo "❌ Docker Security Scan: Failed" >> security-summary.md
        fi
        
        if [ "${{ needs.secrets-scan.result }}" = "success" ]; then
          echo "✅ Secrets Scanning: Passed" >> security-summary.md
        else
          echo "❌ Secrets Scanning: Failed" >> security-summary.md
        fi
        
        echo "" >> security-summary.md
        echo "## Recommendations" >> security-summary.md
        echo "" >> security-summary.md
        echo "- Review all failed scans immediately" >> security-summary.md
        echo "- Address any high or critical vulnerabilities" >> security-summary.md
        echo "- Update dependencies regularly" >> security-summary.md
        echo "- Follow secure coding practices" >> security-summary.md
        
        cat security-summary.md
        
    - name: "📋 Upload security summary"
      uses: actions/upload-artifact@v3
      with:
        name: security-summary
        path: security-summary.md
