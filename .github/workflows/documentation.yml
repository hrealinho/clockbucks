name: 📚 Documentation

on:
  push:
    branches: [ main, master ]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'src/**/*.py'  # For API docs generation
  pull_request:
    branches: [ main, master ]
    paths:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  generate-api-docs:
    name: "📋 Generate API Documentation"
    runs-on: ubuntu-latest
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "🐍 Set up Python"
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: "📦 Install dependencies"
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pdoc3 mkdocs mkdocs-material mkdocs-mermaid2-plugin
        
    - name: "📋 Generate API documentation with pdoc"
      run: |
        pdoc --html --output-dir docs/api src --force
        
    - name: "🚀 Start FastAPI for OpenAPI spec"
      run: |
        python -m uvicorn src.main:app --host 127.0.0.1 --port 8000 &
        sleep 10
        
    - name: "📄 Download OpenAPI spec"
      run: |
        curl http://127.0.0.1:8000/openapi.json > docs/openapi.json
        
    - name: "📚 Generate MkDocs documentation"
      run: |
        mkdocs build --clean
        
    - name: "📋 Upload documentation artifacts"
      uses: actions/upload-artifact@v3
      with:
        name: documentation
        path: |
          site/
          docs/api/
          docs/openapi.json

  deploy-docs:
    name: "🚀 Deploy Documentation"
    runs-on: ubuntu-latest
    needs: generate-api-docs
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "📥 Download documentation"
      uses: actions/download-artifact@v3
      with:
        name: documentation
        
    - name: "🚀 Deploy to GitHub Pages"
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
        cname: clockbucks-docs.your-domain.com  # Update with your domain
        
  check-links:
    name: "🔗 Check Documentation Links"
    runs-on: ubuntu-latest
    needs: generate-api-docs
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "📥 Download documentation"
      uses: actions/download-artifact@v3
      with:
        name: documentation
        
    - name: "🔗 Check links"
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-quiet-mode: 'yes'
        use-verbose-mode: 'yes'
        config-file: '.github/workflows/link-check-config.json'
        
  validate-docs:
    name: "✅ Validate Documentation"
    runs-on: ubuntu-latest
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "🔍 Check README format"
      run: |
        # Check if README has required sections
        if ! grep -q "## Installation" README.md; then
          echo "❌ README missing Installation section"
          exit 1
        fi
        
        if ! grep -q "## Usage" README.md; then
          echo "❌ README missing Usage section"
          exit 1
        fi
        
        if ! grep -q "## API Documentation" README.md; then
          echo "❌ README missing API Documentation section"
          exit 1
        fi
        
        echo "✅ README format validation passed"
        
    - name: "🔍 Check documentation structure"
      run: |
        # Check if required documentation files exist
        required_files=(
          "docs/DEV_TEST_README.md"
          "DEPLOYMENT.md"
          "PROJECT_SUMMARY.md"
        )
        
        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ]; then
            echo "❌ Required documentation file missing: $file"
            exit 1
          fi
        done
        
        echo "✅ Documentation structure validation passed"
