name: Clock Bucks CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  # Job 1: Code Quality and Testing
  test:
    name: "🧪 Test & Quality Checks"
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "🐍 Set up Python ${{ matrix.python-version }}"
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: "📦 Cache dependencies"
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: "📥 Install dependencies"
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: "🔍 Code formatting check (Black)"
      run: black --check src tests
      
    - name: "📏 Import sorting check (isort)"
      run: isort --check-only src tests
      
    - name: "🔎 Linting (flake8)"
      run: flake8 src tests
      
    - name: "🏷️ Type checking (mypy)"
      run: mypy src
      continue-on-error: true  # Allow to fail initially
      
    - name: "🧪 Run tests with coverage"
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html --cov-report=term-missing
        
    - name: "📊 Upload coverage to Codecov"
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # Job 2: Security Scanning
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "🔍 Run Bandit Security Scan"
      uses: tj-actions/bandit@v5.1
      with:
        options: "-r src/ -f json -o bandit-report.json"
        
    - name: "🛡️ Run Safety Check"
      run: |
        pip install safety
        safety check --json --output safety-report.json || true
        
    - name: "📋 Upload security reports"
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  # Job 3: Build Docker Images
  build:
    name: "🐳 Build Docker Images"
    runs-on: ubuntu-latest
    needs: [test, security]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "🔧 Set up Docker Buildx"
      uses: docker/setup-buildx-action@v3
      
    - name: "🔑 Log in to Container Registry"
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: "🏷️ Extract metadata"
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: "🔨 Build and push Docker image"
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.prod
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: "🔍 Run Trivy vulnerability scanner"
      if: github.event_name != 'pull_request'
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: "📋 Upload Trivy scan results"
      if: github.event_name != 'pull_request'
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Job 4: Deploy to Staging
  deploy-staging:
    name: "🚀 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master'
    environment: staging
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "⚙️ Configure kubectl"
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
        
    - name: "🔑 Setup Kubernetes config"
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
        
    - name: "🚀 Deploy to staging"
      run: |
        # Update image in deployment
        kubectl set image deployment/clockbucks-api clockbucks-api=${{ needs.build.outputs.image-tag }} -n clockbucks-staging
        
        # Wait for rollout
        kubectl rollout status deployment/clockbucks-api -n clockbucks-staging --timeout=300s
        
        # Run health check
        kubectl get pods -n clockbucks-staging
        
    - name: "🔍 Run smoke tests"
      run: |
        # Get service URL
        STAGING_URL=$(kubectl get svc clockbucks-api-service -n clockbucks-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        # Wait for service to be ready
        sleep 30
        
        # Health check
        curl -f http://$STAGING_URL/health || exit 1
        
        # API test
        curl -f http://$STAGING_URL/docs || exit 1
        
        echo "✅ Staging deployment successful!"

  # Job 5: Deploy to Production
  deploy-production:
    name: "🌟 Deploy to Production"
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    environment: production
    
    steps:
    - name: "📥 Checkout code"
      uses: actions/checkout@v4
      
    - name: "⚙️ Configure kubectl"
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
        
    - name: "🔑 Setup Kubernetes config"
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
        
    - name: "🔄 Blue-Green Deployment"
      run: |
        # Create new deployment with green suffix
        kubectl create deployment clockbucks-api-green --image=${{ needs.build.outputs.image-tag }} -n clockbucks-production --dry-run=client -o yaml | kubectl apply -f -
        
        # Wait for green deployment
        kubectl rollout status deployment/clockbucks-api-green -n clockbucks-production --timeout=300s
        
        # Health check on green
        kubectl wait --for=condition=available deployment/clockbucks-api-green -n clockbucks-production --timeout=300s
        
        # Switch service to green
        kubectl patch service clockbucks-api-service -n clockbucks-production -p '{"spec":{"selector":{"app":"clockbucks-api-green"}}}'
        
        # Wait and verify
        sleep 30
        
        # Cleanup old blue deployment
        kubectl delete deployment clockbucks-api-blue -n clockbucks-production --ignore-not-found=true
        
        # Rename green to blue for next deployment
        kubectl patch deployment clockbucks-api-green -n clockbucks-production -p '{"spec":{"selector":{"matchLabels":{"app":"clockbucks-api-blue"}},"template":{"metadata":{"labels":{"app":"clockbucks-api-blue"}}}}}'
        
        echo "✅ Production deployment successful!"
        
    - name: "📊 Post-deployment tests"
      run: |
        # Get production URL
        PROD_URL=$(kubectl get svc clockbucks-api-service -n clockbucks-production -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        # Comprehensive health checks
        curl -f https://$PROD_URL/health || exit 1
        curl -f https://$PROD_URL/docs || exit 1
        
        # Performance test
        echo "Running performance tests..."
        # Add your performance test commands here
        
        echo "✅ Production health checks passed!"

  # Job 6: Notification
  notify:
    name: "📢 Notify"
    runs-on: ubuntu-latest
    needs: [test, security, build, deploy-staging, deploy-production]
    if: always()
    
    steps:
    - name: "📱 Slack Notification"
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
      if: always()
      
    - name: "📧 Email Notification"
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "🚨 Clock Bucks Deployment Failed"
        body: |
          Deployment failed for Clock Bucks
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref }}
          Commit: ${{ github.sha }}
          Workflow: ${{ github.workflow }}
          
          Please check the GitHub Actions logs for details.
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: Clock Bucks CI/CD
