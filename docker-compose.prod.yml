version: '3.8'

services:
  clockbucks-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: clockbucks-api-prod
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-clockbucks}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-clockbucks}
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - clockbucks-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  postgres:
    image: postgres:15-alpine
    container_name: clockbucks-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clockbucks}
      POSTGRES_USER: ${POSTGRES_USER:-clockbucks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clockbucks-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clockbucks}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: clockbucks-redis-prod
    networks:
      - clockbucks-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  nginx:
    image: nginx:alpine
    container_name: clockbucks-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - clockbucks-api
    networks:
      - clockbucks-network
    restart: unless-stopped

networks:
  clockbucks-network:
    driver: bridge

volumes:
  postgres_data:
